server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # NAT redirect catch-all: requests with non-local Host headers
    # come from MikroTik NAT-redirected overdue customers.
    # Redirect them to the generic overdue notice page.
    set $is_nat_redirect 0;
    if ($http_host !~* "^(localhost|127\.0\.0\.1|netl\.2max\.tech|10\.|172\.|192\.168\.)") {
        set $is_nat_redirect 1;
    }

    # SPA fallback
    location / {
        if ($is_nat_redirect) {
            return 302 /overdue;
        }
        try_files $uri $uri/ /index.html;
    }

    # Proxy uploads to backend
    location /api/v1/uploads/ {
        proxy_pass http://backend:8000/uploads/;
        proxy_set_header Host $host;
    }

    # Proxy API to backend
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

}
